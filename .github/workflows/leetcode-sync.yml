name: LeetCode Sync Action

on:
  schedule:
    - cron: "0 18 * * *" # 매일 한국 시간 자정(UTC 15:00)에 자동 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Node.js 18 버전 세팅 (내장 fetch API 사용을 위해 필수)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Node.js Sync Script
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }} # 깃허브 시크릿에서 가져옴
        run: node scripts/sync_leetcode.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add LeetCode/
          # 변경 사항이 있을 때만 커밋, 없으면 에러 없이 넘기기
          git commit -m "Auto-sync LeetCode solutions" || echo "No changes to commit"
          git push